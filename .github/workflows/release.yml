name: Release

on:
  push:
    tags:
      - 'v*.*.*'

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: "true"

permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter build macos --release
      - name: Package and upload
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cd build/macos/Build/Products/Release
          zip -r ${{ github.workspace }}/flipclock-macos.zip flipclock.app
          gh release create ${{ github.ref_name }} --title "Flip Clock ${{ github.ref_name }}" --notes "" 2>/dev/null || true
          gh release upload ${{ github.ref_name }} ${{ github.workspace }}/flipclock-macos.zip --clobber

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter build windows --release
      - name: Package and upload
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $root = "${{ github.workspace }}"
          $releaseDir = Get-ChildItem -Path "$root\build\windows" -Recurse -Directory `
            | Where-Object { $_.Name -eq "Release" -and $_.FullName -match "runner\\Release$" } `
            | Select-Object -First 1
          if (-not $releaseDir) {
            Write-Host "Build output not found. Listing build/windows:"
            Get-ChildItem "$root\build\windows" -Recurse -Depth 4 | Select-Object FullName
            exit 1
          }
          Write-Host "Found build output: $($releaseDir.FullName)"
          $zip = "$root\flipclock-windows.zip"
          Compress-Archive -Path "$($releaseDir.FullName)\*" -DestinationPath $zip
          gh release create ${{ github.ref_name }} --title "Flip Clock ${{ github.ref_name }}" --notes "" 2>$null | Out-Null
          gh release upload ${{ github.ref_name }} $zip --clobber

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev libkeybinder-3.0-dev
      - run: flutter pub get
      - run: flutter build linux --release
      - name: Package and upload
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cd build/linux/x64/release/bundle
          zip -r ${{ github.workspace }}/flipclock-linux.zip .
          gh release create ${{ github.ref_name }} --title "Flip Clock ${{ github.ref_name }}" --notes "" 2>/dev/null || true
          gh release upload ${{ github.ref_name }} ${{ github.workspace }}/flipclock-linux.zip --clobber
