name: Release

on:
  push:
    tags:
      - 'v*.*.*'

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: "true"

permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter build macos --release
      - name: Zip .app bundle
        working-directory: build/macos/Build/Products/Release
        run: zip -r ${{ github.workspace }}/flipclock-macos.zip flipclock.app
      - uses: softprops/action-gh-release@v2
        with:
          files: flipclock-macos.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ github.token }}

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter build windows --release
      - name: Zip build artifacts
        working-directory: build/windows/runner/Release
        shell: bash
        run: zip -r ${{ github.workspace }}/flipclock-windows.zip .
      - uses: softprops/action-gh-release@v2
        with:
          files: flipclock-windows.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ github.token }}

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev libkeybinder-3.0-dev
      - run: flutter pub get
      - run: flutter build linux --release
      - name: Zip build bundle
        working-directory: build/linux/x64/release/bundle
        run: zip -r ${{ github.workspace }}/flipclock-linux.zip .
      - uses: softprops/action-gh-release@v2
        with:
          files: flipclock-linux.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ github.token }}
