name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter build macos --release
      - uses: actions/upload-artifact@v4
        with:
          name: flipclock-macos
          path: build/macos/Build/Products/Release/

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter build windows --release
      - uses: actions/upload-artifact@v4
        with:
          name: flipclock-windows
          path: build/windows/runner/Release/

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev libkeybinder-3.0-dev
      - run: flutter pub get
      - run: flutter build linux --release
      - uses: actions/upload-artifact@v4
        with:
          name: flipclock-linux
          path: build/linux/x64/release/bundle

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-macos
      - build-windows
      - build-linux
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Zip macOS artifact
        run: cd artifacts/flipclock-macos && zip -r ../../flipclock-macos.zip flipclock.app
      - name: Zip Linux artifact
        run: cd artifacts/flipclock-linux && zip -r ../../flipclock-linux.zip .
      - name: Zip Windows artifact
        run: cd artifacts/flipclock-windows && zip -r ../../flipclock-windows.zip .
      - name: Generate release notes
        run: |
          echo "## Flip Clock ${{ github.ref_name }}" > release-notes.md
          echo "" >> release-notes.md
          echo "Desktop builds for macOS, Windows, and Linux." >> release-notes.md
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Flip Clock ${{ github.ref_name }}
          body_path: release-notes.md
          files: |
            flipclock-macos.zip
            flipclock-windows.zip
            flipclock-linux.zip
          draft: false
          prerelease: false
